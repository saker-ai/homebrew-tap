name: Update Formula

on:
  repository_dispatch:
    types: [formula-update]
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (without v prefix)"
        required: true
      sha_darwin_arm64:
        description: "SHA256 for darwin-arm64"
        required: true
      sha_darwin_amd64:
        description: "SHA256 for darwin-amd64"
        required: true
      sha_linux_arm64:
        description: "SHA256 for linux-arm64"
        required: true
      sha_linux_amd64:
        description: "SHA256 for linux-amd64"
        required: true

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set variables
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ]; then
            echo "version=${{ github.event.client_payload.version }}" >> "$GITHUB_OUTPUT"
            echo "sha_darwin_arm64=${{ github.event.client_payload.sha_darwin_arm64 }}" >> "$GITHUB_OUTPUT"
            echo "sha_darwin_amd64=${{ github.event.client_payload.sha_darwin_amd64 }}" >> "$GITHUB_OUTPUT"
            echo "sha_linux_arm64=${{ github.event.client_payload.sha_linux_arm64 }}" >> "$GITHUB_OUTPUT"
            echo "sha_linux_amd64=${{ github.event.client_payload.sha_linux_amd64 }}" >> "$GITHUB_OUTPUT"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "sha_darwin_arm64=${{ inputs.sha_darwin_arm64 }}" >> "$GITHUB_OUTPUT"
            echo "sha_darwin_amd64=${{ inputs.sha_darwin_amd64 }}" >> "$GITHUB_OUTPUT"
            echo "sha_linux_arm64=${{ inputs.sha_linux_arm64 }}" >> "$GITHUB_OUTPUT"
            echo "sha_linux_amd64=${{ inputs.sha_linux_amd64 }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Update formula
        env:
          VERSION: ${{ steps.vars.outputs.version }}
          SHA_DARWIN_ARM64: ${{ steps.vars.outputs.sha_darwin_arm64 }}
          SHA_DARWIN_AMD64: ${{ steps.vars.outputs.sha_darwin_amd64 }}
          SHA_LINUX_ARM64: ${{ steps.vars.outputs.sha_linux_arm64 }}
          SHA_LINUX_AMD64: ${{ steps.vars.outputs.sha_linux_amd64 }}
        run: |
          sed -i "s/version \".*\"/version \"${VERSION}\"/" Formula/saker.rb
          sed -i "s/sha256 \".*\" # darwin-arm64/sha256 \"${SHA_DARWIN_ARM64}\" # darwin-arm64/" Formula/saker.rb
          sed -i "s/sha256 \".*\" # darwin-amd64/sha256 \"${SHA_DARWIN_AMD64}\" # darwin-amd64/" Formula/saker.rb
          sed -i "s/sha256 \".*\" # linux-arm64/sha256 \"${SHA_LINUX_ARM64}\" # linux-arm64/" Formula/saker.rb
          sed -i "s/sha256 \".*\" # linux-amd64/sha256 \"${SHA_LINUX_AMD64}\" # linux-amd64/" Formula/saker.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/saker.rb
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "saker v${VERSION}"
          git push
        env:
          VERSION: ${{ steps.vars.outputs.version }}
